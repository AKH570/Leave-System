{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | LeaveBox</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap-5.3.2.min.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="login-page">
        <span class="login-shape login-shape--one" aria-hidden="true"></span>
        <span class="login-shape login-shape--two" aria-hidden="true"></span>
        <main class="login-panel">
            <div class="login-card">
                <div class="login-brand">
                    <img src="{% static 'images/leavebox-logo.png' %}" alt="LeaveBox — your easy leave solution" class="login-logo">
                    <span class="login-brand-divider" aria-hidden="true"></span>
                    <h1>Welcome Back</h1>
                    <p>Your Easy Leave Solution</p>
                </div>

                {% if messages %}
                    <div class="login-alerts">
                        {% for message in messages %}
                            <div class="alert alert-danger" role="alert">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="post" class="login-form">
                    {% csrf_token %}
                    <div class="login-field">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" value="{{ request.POST.username|default:'' }}" placeholder="Enter your username" autocomplete="username" required autofocus>
                    </div>
                    <div class="login-field">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>

                    <div class="form-actions">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <a href="#">Forgot password?</a>
                    </div>

                    <div class="login-submit-wrap">
                        <button type="submit" class="btn btn-primary btn-login">Sign In</button>
                    </div>
                </form>

                <div class="login-footer">
                    <p>New to the system? <a href="{% url 'accounts:register' %}">Create an account</a></p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
